    .search-wrap {
      max-width: 480px;

      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    #blogSearch {
      width: 100%;
      padding: 11px 16px 11px 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--card-bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #blogSearch:focus {
      border-color: var(--blog);
      box-shadow: 0 0 0 3px rgba(26,158,110,0.1);
    }

    #blogSearch::placeholder { color: #bbb; }

    /* RESULTS COUNT */
    .results-meta {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px 0;
      font-size: 13px;
      color: var(--muted);
      min-height: 28px;
    }

    /* GRID */
    .blog-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .blog-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .blog-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    .blog-card-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--blog);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .blog-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      line-height: 1.3;
      color: var(--ink);
    }

    .blog-card p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .blog-card-meta {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 4px;
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    function filterPosts() {
      const q = document.getElementById('blogSearch').value.trim().toLowerCase();
      const grid = document.getElementById('blogGrid');
      const meta = document.getElementById('resultsMeta');

      const filtered = q
        ? posts.filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.desc.toLowerCase().includes(q) ||
            p.tag.toLowerCase().includes(q)
          )
        : posts;

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p>No articles found for "<strong>' + q + '</strong>"</p></div>';
        meta.textContent = '0 articles';
        return;
      }

      meta.textContent = q ? filtered.length + ' of ' + posts.length + ' articles' : '';

      grid.innerHTML = filtered.map(p => `
        <a href="${p.href}" class="blog-card">
          <span class="blog-card-tag">${p.tag}</span>
          <h2>${p.title}</h2>
          <p>${p.desc}</p>
          <span class="blog-card-meta">${p.meta}</span>
        </a>
      `).join('');
    }

    // 초기 렌더
    filterPosts();
